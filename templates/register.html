<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>أكاديمية ربوع العين — تسجيل لاعب جديد</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#131313;
    --bg-2:#0d0d0d;
    --panel:#181818;
    --gold:#F2CA50;
    --gold-soft:rgba(242,202,80,.10);
    --gold-line:rgba(242,202,80,.22);
    --gold-line-strong:rgba(242,202,80,.45);
    --red:#e3735e;
    --green:#5fcf80;
    --fg:#ffffff;
    --muted:#9b988d;
    --muted-2:#6f6c63;
    --font:'Tajawal', -apple-system, 'Segoe UI', system-ui, sans-serif;
    --glow:0 0 16px rgba(242,202,80,.45);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--fg);font-family:var(--font);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
  body{min-height:100vh;display:flex;flex-direction:column;background:
      radial-gradient(1000px 540px at 50% -12%, rgba(242,202,80,.08), transparent 60%),
      radial-gradient(680px 460px at 6% 116%, rgba(242,202,80,.045), transparent 60%),
      var(--bg);}
  ::selection{background:var(--gold);color:#131313}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer}
  .wrap{max-width:1400px;margin:0 auto;padding:0 30px;width:100%}

  /* ============ HEADER (unified) ============ */
  header.topbar{
    border-bottom:1px solid var(--gold-line);
    background:linear-gradient(180deg, rgba(242,202,80,.05), rgba(12,12,12,.30) 78%), rgba(12,12,12,.6);
    position:sticky;top:0;z-index:40;backdrop-filter:blur(12px) saturate(1.1);-webkit-backdrop-filter:blur(12px) saturate(1.1);
  }
  .topbar-inner{display:flex;align-items:center;justify-content:space-between;gap:28px;padding:15px 0}
  .brand{display:flex;align-items:center;gap:14px}
  .crest{width:56px;height:56px;border-radius:14px;flex:none;display:grid;place-items:center;
    background:radial-gradient(circle at 30% 25%, rgba(242,202,80,.28), transparent 62%), var(--panel);
    border:1px solid var(--gold-line-strong);box-shadow:inset 0 0 22px rgba(242,202,80,.14), var(--glow)}
  .crest svg{width:32px;height:32px;color:var(--gold)}
  .brand-text .ar{font-size:20px;font-weight:900;letter-spacing:-.01em;line-height:1.1;color:var(--gold);text-shadow:0 0 18px rgba(242,202,80,.35)}
  .brand-text .loc{display:flex;align-items:center;gap:6px;font-size:12px;color:#fff;opacity:.78;margin-top:5px}
  .brand-text .loc svg{width:12px;height:12px;color:var(--gold)}

  .nav-links{display:flex;align-items:center;gap:4px}
  .nav-links a{color:var(--gold);font-weight:700;font-size:15px;padding:9px 18px;border-radius:10px;
    transition:color .18s, background .18s, text-shadow .18s}
  .nav-links a:hover{color:#fff;background:rgba(242,202,80,.08);text-shadow:0 0 16px rgba(242,202,80,.85)}
  .nav-links a.active{color:#131313;background:var(--gold);text-shadow:none;box-shadow:var(--glow)}

  .actions{direction:ltr;display:flex;align-items:center;gap:12px}
  .cta{display:inline-flex;align-items:center;gap:9px;
    background:linear-gradient(180deg,#cf9f2e,#a8781b);color:#fff;font-weight:800;font-size:15px;
    padding:13px 22px;border:1px solid rgba(242,202,80,.6);border-radius:14px;white-space:nowrap;
    box-shadow:0 6px 22px rgba(242,202,80,.22), inset 0 1px 0 rgba(255,255,255,.28);transition:transform .12s ease, box-shadow .12s ease}
  .cta:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(242,202,80,.34), inset 0 1px 0 rgba(255,255,255,.4)}
  .cta svg{width:18px;height:18px}
  .ico-btn{position:relative;width:44px;height:44px;border-radius:12px;flex:none;display:grid;place-items:center;
    background:var(--panel);border:1px solid var(--gold-line);color:var(--gold);transition:.16s}
  .ico-btn:hover{border-color:var(--gold-line-strong);box-shadow:var(--glow)}
  .ico-btn svg{width:20px;height:20px}
  .ico-btn .dot{position:absolute;top:9px;left:11px;width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 8px var(--red);border:1.5px solid var(--panel)}

  /* ============ REGISTER FORM ============ */
  main{flex:1;display:flex;align-items:center;justify-content:center;padding:56px 30px}
  .form-card{width:100%;max-width:520px;position:relative;
    background:linear-gradient(180deg, rgba(24,24,22,.72), rgba(13,13,13,.66));
    border:1px solid var(--gold-line);border-radius:22px;padding:40px 38px 36px;
    box-shadow:0 30px 70px rgba(0,0,0,.55), inset 0 0 0 1px rgba(242,202,80,.05)}
  .form-card::before{content:"";position:absolute;inset:0;border-radius:22px;pointer-events:none;
    background:radial-gradient(420px 160px at 100% 0%, rgba(242,202,80,.10), transparent 70%)}
  .fc-head{position:relative;text-align:center;margin-bottom:30px}
  .fc-emblem{width:60px;height:60px;border-radius:16px;margin:0 auto 16px;display:grid;place-items:center;
    background:var(--gold-soft);border:1px solid var(--gold-line-strong);color:var(--gold);box-shadow:var(--glow)}
  .fc-emblem svg{width:30px;height:30px}
  .fc-head h1{font-size:25px;font-weight:900;letter-spacing:-.01em;color:#fff}
  .fc-head p{font-size:13.5px;color:var(--muted);margin-top:8px}

  .field{position:relative;margin-bottom:20px}
  .field label{display:block;font-size:13.5px;font-weight:700;color:var(--gold);margin-bottom:9px;letter-spacing:.01em}
  .control{width:100%;height:54px;background:rgba(8,8,8,.55);border:1px solid var(--gold-line);
    color:#fff;font-family:inherit;font-size:15.5px;font-weight:500;padding:0 16px;border-radius:13px;outline:none;
    transition:border-color .16s, box-shadow .16s, background .16s}
  .control::placeholder{color:var(--muted-2)}
  .control:hover{border-color:var(--gold-line-strong)}
  .control:focus{border-color:var(--gold);background:rgba(8,8,8,.7);box-shadow:0 0 0 3px rgba(242,202,80,.14)}
  /* in-field icons + submit check: hidden on desktop/tablet, revealed only on mobile */
  .fi{display:none}
  .submit-check{display:none}

  /* custom select */
  .select-wrap{position:relative}
  select.control{appearance:none;-webkit-appearance:none;-moz-appearance:none;padding-inline-end:46px;cursor:pointer}
  .select-wrap .chevron{position:absolute;inset-inline-start:16px;top:50%;transform:translateY(-50%);
    width:20px;height:20px;color:var(--gold);pointer-events:none;display:grid;place-items:center;
    filter:drop-shadow(0 0 6px rgba(242,202,80,.5))}
  .select-wrap .chevron svg{width:18px;height:18px}
  select.control option{background:#131313;color:#fff}

  /* ====== إخفاء جميع الأسهم/الأيقونات الافتراضية داخل الحقول (شامل وقوي) ====== */
  /* إزالة السهم الافتراضي للقوائم وحقول الإدخال في كل المتصفحات */
  select.control,
  input.control{
    -webkit-appearance:none !important;
    -moz-appearance:none !important;
    appearance:none !important;
    background-image:none !important;
  }
  /* Edge / IE: إخفاء سهم القائمة المنسدلة */
  select.control::-ms-expand{
    display:none !important;
  }
  /* Chrome / Edge / Safari: إخفاء أيقونة منتقي التاريخ وأسهم الزيادة/النقصان */
  .control::-webkit-calendar-picker-indicator,
  .control::-webkit-inner-spin-button,
  .control::-webkit-outer-spin-button{
    -webkit-appearance:none !important;
    appearance:none !important;
    display:none !important;
    margin:0 !important;
    opacity:0 !important;
    pointer-events:none !important;
  }
  /* Firefox: إظهار الأرقام فقط بدون أسهم */
  input[type="number"].control{
    -moz-appearance:textfield !important;
    appearance:textfield !important;
  }

  .submit{width:100%;height:56px;margin-top:8px;border:1px solid rgba(242,202,80,.7);border-radius:14px;
    background:linear-gradient(180deg,#f0c54a,#c79a2e);color:#fff;font-weight:900;font-size:17px;letter-spacing:.01em;
    box-shadow:0 10px 26px rgba(242,202,80,.28), inset 0 1px 0 rgba(255,255,255,.4);
    transition:transform .12s ease, box-shadow .12s ease}
  .submit:hover{transform:translateY(-2px);box-shadow:0 16px 36px rgba(242,202,80,.4), inset 0 1px 0 rgba(255,255,255,.5)}
  .submit:active{transform:translateY(0)}

  .ok-msg{display:none;align-items:center;gap:10px;color:var(--green);font-weight:700;font-size:14px;
    margin-top:18px;padding:13px 15px;background:rgba(95,207,128,.08);border:1px solid rgba(95,207,128,.25);border-radius:12px}
  .ok-msg.show{display:flex}
  .ok-msg svg{width:18px;height:18px;flex:none}

  .back-link{position:relative;display:block;text-align:center;margin-top:22px;font-size:13px;color:var(--muted);font-weight:600}
  .back-link:hover{color:var(--gold)}

  /* ============ RESPONSIVE ============ */
  @media (max-width:920px){
    .topbar-inner{flex-wrap:wrap;gap:14px}
    .nav-links{order:3;width:100%;justify-content:center;flex-wrap:wrap;border-top:1px solid var(--gold-line);padding-top:12px}
  }
  @media (max-width:560px){
    .wrap{padding:0 16px}
    main{padding:32px 16px}
    .form-card{padding:30px 22px 28px}
    .brand-text .ar{font-size:17px}
    .cta{padding:11px 16px;font-size:14px}
    .actions{flex:1;justify-content:flex-end}
  }

  /* ============================================================
     MOBILE PREMIUM REFINEMENT — phones only (< 768px)
     Isolated block; nothing here applies at ≥768px, so desktop
     and tablet stay pixel-perfect. Goal: less scroll, tighter
     8px rhythm, softer glow, more of the form on first screen.
     ============================================================ */
  @media (max-width:767px){
    /* soften every var-driven glow ~60% (mobile only) */
    :root{--glow:0 0 6px rgba(242,202,80,.18)}

    .wrap{padding:0 16px}

    /* ---- HEADER: ~30% shorter, single back affordance (the logo) ---- */
    .topbar-inner{gap:12px;padding:10px 0}          /* 15px → 10px ≈ −33% */
    .crest{width:40px;height:40px;border-radius:11px;box-shadow:inset 0 0 12px rgba(242,202,80,.10)}
    .crest svg{width:23px;height:23px}
    .brand-text .ar{font-size:16px;text-shadow:0 0 8px rgba(242,202,80,.16)}
    .brand-text .loc{font-size:10px;opacity:.6;margin-top:3px;gap:4px}
    .brand-text .loc svg{width:10px;height:10px}
    /* req 1 + 2: remove the large back button AND the bottom back link on mobile.
       Header logo (links to index.html) remains the single, non-duplicated back path. */
    .actions .cta{display:none}
    .back-link{display:none}

    /* ---- LAYOUT: pull form to top → more visible on first screen ---- */
    main{align-items:flex-start;padding:16px 16px 24px}
    .form-card{padding:18px 16px 20px;border-radius:18px;
      box-shadow:0 12px 30px rgba(0,0,0,.4);animation:mFade .4s ease both}
    .form-card::before{background:radial-gradient(300px 120px at 100% 0%, rgba(242,202,80,.06), transparent 70%)}

    /* ---- HEAD: bigger title, smaller description, tighter ---- */
    .fc-head{margin-bottom:16px}
    .fc-emblem{width:44px;height:44px;border-radius:12px;margin:0 auto 10px;box-shadow:none}
    .fc-emblem svg{width:24px;height:24px}
    .fc-head h1{font-size:22px}                      /* prominent title */
    .fc-head p{font-size:12px;margin-top:5px}        /* quieter description */

    /* ---- FIELDS: 8px rhythm, shorter but comfortable, icons + better contrast ---- */
    .field{margin-bottom:14px}
    .field label{font-size:12.5px;margin-bottom:6px} /* tighter label→input gap */
    .control{height:46px;font-size:16px;border-radius:12px} /* −15% height; 16px avoids iOS zoom */
    .control::placeholder{color:var(--muted)}        /* improved placeholder contrast */
    .control:focus{box-shadow:0 0 0 3px rgba(242,202,80,.12)}

    /* icons live inside the inputs on the reading side (start = right in RTL) */
    .fi{display:grid;place-items:center;position:absolute;bottom:13px;
      inset-inline-start:14px;width:20px;height:20px;color:var(--gold);opacity:.75;pointer-events:none}
    .fi svg{width:20px;height:20px}
    #fullName,#guardian,#birthYear{padding-inline-start:44px}
    /* select: keep chevron, shift it to the far (end) side so the calendar icon owns the start */
    select#birthYear{padding-inline-end:40px}
    .select-wrap .chevron{inset-inline-start:auto;inset-inline-end:14px}

    /* ---- SUBMIT: gold kept, check icon, full width, shorter, premium tap ---- */
    .submit{height:50px;font-size:16px;display:flex;align-items:center;justify-content:center;gap:8px;
      box-shadow:0 6px 18px rgba(242,202,80,.22), inset 0 1px 0 rgba(255,255,255,.4)} /* the one allowed glow */
    .submit-check{display:block;width:18px;height:18px}
    .submit:hover{box-shadow:0 9px 24px rgba(242,202,80,.30), inset 0 1px 0 rgba(255,255,255,.5)}
    .submit:active{transform:scale(.98)}

    .ok-msg{margin-top:14px;padding:11px 13px}

    @keyframes mFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    @media (prefers-reduced-motion:reduce){.form-card{animation:none}}
  }
</style>
</head>
<body>

<!-- ============ HEADER ============ -->
<header class="topbar">
  <div class="wrap topbar-inner">

    <!-- Brand — RIGHT (links back to dashboard) -->
    <div class="brand">
      <div class="crest" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 7.5 7.2 10 12 4.5 16.8 10 19 7.5l-1 6.5H6l-1-6.5Z"/>
          <circle cx="5" cy="7" r=".9" fill="currentColor"/><circle cx="12" cy="4" r=".9" fill="currentColor"/><circle cx="19" cy="7" r=".9" fill="currentColor"/>
          <path d="M8.5 16.5c.9 1.4 2.1 2 3.5 2s2.6-.6 3.5-2"/>
          <path d="M10.4 15.6h.01M13.6 15.6h.01"/>
        </svg>
      </div>
      <div class="brand-text">
        <div class="ar">أكاديمية ربوع العين</div>
        <div class="loc">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
          ربوع العين - المملكة العربية السعودية
        </div>
      </div>
    </div>
  </div>
</header>

<!-- ============ REGISTER FORM ============ -->
<main>
  <form class="form-card" id="regForm" novalidate>
    <div class="fc-head">
      <div class="fc-emblem" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg>
      </div>
      <h1>تسجيل لاعب جديد</h1>
      <p>أدخل بيانات اللاعب لإنشاء ملف التحاق في الأكاديمية</p>
    </div>

    <!-- Field 1 -->
    <div class="field">
      <label for="fullName">اسم اللاعب الثلاثي</label>
      <input class="control" id="fullName" type="text" placeholder="مثال: عبدالله محمد الغامدي" required>
      <span class="fi" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
    </div>

    <!-- Field 2 -->
    <div class="field">
      <label for="birthYear">سنة الميلاد</label>
      <div class="select-wrap">
        <select class="control" id="birthYear" required>
          <!-- years 2000 → 2030, 2003 preselected -->
          <option value="2000">2000</option>
          <option value="2001">2001</option>
          <option value="2002">2002</option>
          <option value="2003" selected>2003</option>
          <option value="2004">2004</option>
          <option value="2005">2005</option>
          <option value="2006">2006</option>
          <option value="2007">2007</option>
          <option value="2008">2008</option>
          <option value="2009">2009</option>
          <option value="2010">2010</option>
          <option value="2011">2011</option>
          <option value="2012">2012</option>
          <option value="2013">2013</option>
          <option value="2014">2014</option>
          <option value="2015">2015</option>
          <option value="2016">2016</option>
          <option value="2017">2017</option>
          <option value="2018">2018</option>
          <option value="2019">2019</option>
          <option value="2020">2020</option>
          <option value="2021">2021</option>
          <option value="2022">2022</option>
          <option value="2023">2023</option>
          <option value="2024">2024</option>
          <option value="2025">2025</option>
          <option value="2026">2026</option>
          <option value="2027">2027</option>
          <option value="2028">2028</option>
          <option value="2029">2029</option>
          <option value="2030">2030</option>
        </select>
        <span class="chevron" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </span>
        <span class="fi" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></span>
      </div>
    </div>

    <!-- Field 3 -->
    <div class="field">
      <label for="guardian">رقم ولي الأمر</label>
      <input class="control" id="guardian" type="tel" inputmode="numeric" placeholder="05xxxxxxxx" required>
      <span class="fi" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.6a2 2 0 0 1-.5 2.1L8 9.6a16 16 0 0 0 6 6l1.2-1.2a2 2 0 0 1 2.1-.5c.8.3 1.7.5 2.6.6a2 2 0 0 1 1.7 2Z"/></svg></span>
    </div>

    <button type="submit" class="submit">
      <svg class="submit-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>
      تأكيد التسجيل
    </button>

    <div class="ok-msg" id="okMsg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21.6 7.5 9.7 19.4l-5.3-5.3"/></svg>
      تم تسجيل اللاعب بنجاح وإضافته إلى قائمة الطلبات.
    </div>
  </form>
</main>

<script>
(function(){
  var form=document.getElementById('regForm'),okMsg=document.getElementById('okMsg');
  var submitBtn=form.querySelector('.submit');

  form.addEventListener('submit',function(e){
    e.preventDefault();
    var name=document.getElementById('fullName');
    var phone=document.getElementById('guardian');
    var birthYear=document.getElementById('birthYear');
    var valid=true;

    [name,phone].forEach(function(el){
      if(!el.value.trim()){ el.style.borderColor='var(--red)'; valid=false; }
      else{ el.style.borderColor=''; }
    });
    if(!valid){ return; }

    submitBtn.disabled=true;
    submitBtn.style.opacity='0.7';

    fetch('/register',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        name: name.value.trim(),
        phone: phone.value.trim(),
        birth_year: birthYear.value
      })
    })
    .then(function(r){ return r.json(); })
    .then(function(res){
      submitBtn.disabled=false;
      submitBtn.style.opacity='';
      if(res.success){
        okMsg.classList.add('show');
        setTimeout(function(){ form.reset(); okMsg.classList.remove('show'); }, 2200);
      } else {
        alert(res.message || 'حدث خطأ، حاول مجدداً');
      }
    })
    .catch(function(){
      submitBtn.disabled=false;
      submitBtn.style.opacity='';
      alert('خطأ في الاتصال بالسيرفر');
    });
  });

  ['fullName','guardian'].forEach(function(id){
    document.getElementById(id).addEventListener('input',function(){ this.style.borderColor=''; });
  });
})();
</script>
</body>
</html>
