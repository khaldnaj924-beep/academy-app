<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل لاعب جديد - أكاديمية القوة الرياضية بربوع العين</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* لوحة ألوان مستوحاة من الشعار الذهبي لربوع العين */
            --primary-gold: #d4af37; /* ذهبي معدني كلاسيكي */
            --shining-gold: #ffd700; /* ذهبي لامع للتميز */
            --bg-gradient: linear-gradient(135deg, #101010, #1a1a1a, #0a0a0a); /* خلفية داكنة فخمة ومتدرجة */
            --container-bg: rgba(25, 30, 36, 0.97); /* مربع داكن مع شفافية بسيطة */
            --text-color: #ffffff;
        }

        body {
            font-family: 'Tajawal', 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .register-container {
            background: var(--container-bg);
            padding: 50px 40px;
            border-radius: 25px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 450px;
            border: 3px solid var(--primary-gold); /* حدود ذهبية كاملة للمربع */
            backdrop-filter: blur(15px); /* تأثير زجاجي حديث */
            position: relative;
        }

        /* دمج الشعار الذهبي */
        .academy-logo {
            display: block;
            margin: 0 auto 25px auto;
            width: 110px;
            height: 110px;
            background-image: url('{{ url_for('static', filename='logo.png') }}'); /* رابط شعارك الذهبي */
            background-size: contain;
            background-repeat: no-repeat;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5)); /* توهج ذهبي خفيف */
        }

        /* اسم الأكاديمية بالكامل بخط فخم */
        .academy-name {
            text-align: center;
            color: var(--shining-gold);
            margin-bottom: 35px;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 0.8px;
            line-height: 1.2;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        h3 {
            text-align: center;
            color: #f8f8f8;
            margin-top: -15px;
            margin-bottom: 30px;
            font-size: 19px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 12px;
            font-weight: 700;
            font-size: 16px;
            color: #e8e8e8;
        }

        input {
            width: 100%;
            padding: 18px;
            background-color: #ffffff; /* حقول بيضاء لسهولة القراءة */
            color: #1a1a1a; /* نص داكن داخل الحقل */
            border: 2px solid transparent;
            border-radius: 15px;
            box-sizing: border-box;
            font-size: 17px;
            font-weight: 700;
            font-family: inherit;
            transition: all 0.3s ease;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.08);
        }

        input::placeholder {
            color: #7f8c8d;
            font-weight: 400;
            font-size: 15px;
        }

        /* تأثير عند الضغط على الحقل بتوهج ذهبي */
        input:focus {
            border-color: var(--shining-gold);
            outline: none;
            box-shadow: 0 0 0 5px rgba(255, 215, 0, 0.25);
            transform: translateY(-2px);
        }

        /* زر إرسال معدني ذهبي */
        .btn-submit {
            width: 100%;
            background: linear-gradient(to right, var(--primary-gold), #b8860b);
            color: #0d0d0d; /* خط داكن جداً على الزر الذهبي ليكون بارز جداً */
            padding: 20px;
            border: none;
            border-radius: 15px;
            font-size: 21px;
            font-weight: 900;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
        }

        /* تأثير عند تمرير الماوس على الزر بلمعان ذهبي أكبر */
        .btn-submit:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.6);
            color: #000000;
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* تفاصيل تصميمية إضافية - أوراق غار باهتة */
        .register-container::after {
            content: '';
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background-image: url('{{ url_for('static', filename='laurel.png') }}'); /* أيقونة غار باهتة */
            background-size: contain;
            opacity: 0.05;
        }

    </style>
</head>
<body>

<div class="register-container">
    <div class="academy-logo"></div> <h1 class="academy-name">أكاديمية القوة الرياضية بربوع العين</h1>
    <h3>🏆 تسجيل لاعب جديد</h3>
    <form id="registerForm">
        <div class="form-group">
            <label for="playerName">اسم اللاعب الكامل:</label>
            <input type="text" id="playerName" required placeholder="أدخل اسم اللاعب الثلاثي هنا">
        </div>

        <div class="form-group">
            <label for="parentPhone">رقم واتساب للتواصل (ولي الأمر):</label>
            <input type="tel" id="parentPhone" required placeholder="مثال: 05xxxxxxxx">
        </div>

        <button type="submit" class="btn-submit">إرسال طلب الانضمام 🚀</button>
    </form>
</div>

<script>
// ... (كود الـ JavaScript لإرسال البيانات يبقى كما هو)
document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const playerData = {
        name: document.getElementById('playerName').value,
        phone: document.getElementById('parentPhone').value
    };

    fetch('http://127.0.0.1:5000/register', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify(playerData)
    })
    .then(response => response.json())
    .then(data => {
        if(data.success) {
            alert('🎉 ' + data.message);
            document.getElementById('registerForm').reset();
        } else {
            alert('⚠️ ' + data.message);
        }
    })
    .catch((error) => {
        console.error('Error:', error);
        alert('حدث خطأ في الاتصال بالسيرفر. تأكد من تشغيل ملف البايثون!');
    });
});
</script>

</body>
</html>
